<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync Audio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="pulse-dot" id="pulseDot"></div>
    <h1>Sync Audio</h1>
    <p class="sub">Play music on two devices at once, in sync.</p>
  </header>

  <!-- Landing choice -->
  <section id="landing" class="panel">
    <button id="createBtn" class="btn primary">Host a room</button>
    <div class="divider">or</div>
    <div class="join-row">
      <input id="codeInput" type="text" inputmode="numeric" maxlength="4" placeholder="Room code">
      <button id="joinBtn" class="btn">Join</button>
    </div>
    <p id="landingError" class="error"></p>
  </section>

  <!-- Host panel -->
  <section id="hostPanel" class="panel hidden">
    <div class="room-code-display">
      <span class="label">Room code</span>
      <span id="roomCodeText" class="code"></span>
    </div>
    <p class="hint">Open this same page on your phone (same WiFi) and enter this code.</p>
    <p id="clientStatus" class="hint">Waiting for a device to join…</p>

    <div class="upload-row">
      <input type="file" id="fileInput" accept="audio/*">
    </div>

    <div id="playerControls" class="player-controls hidden">
      <p id="trackName" class="track-name"></p>
      <button id="playBtn" class="btn primary big">▶ Play in sync</button>
      <button id="pauseBtn" class="btn hidden">⏸ Pause</button>
      <p id="syncQuality" class="hint debug"></p>
    </div>
  </section>

  <!-- Client panel -->
  <section id="clientPanel" class="panel hidden">
    <div class="room-code-display">
      <span class="label">Connected to room</span>
      <span id="clientRoomCode" class="code"></span>
    </div>
    <p id="clientWaitMsg" class="hint">Waiting for host to load a track…</p>
    <p id="clientTrackName" class="track-name"></p>
    <p id="clientSyncQuality" class="hint debug"></p>
  </section>

  <p id="globalStatus" class="status"></p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
